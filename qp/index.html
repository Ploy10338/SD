<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>QP-Quality Procedure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
 
<!--  Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
 
<style>
:root{
  --primary:#0d47a1;
  --accent:#e53935;
}
 
body{
  font-family:'Prompt',sans-serif;
  background:linear-gradient(135deg,#eef3ff,#f9fbff);
  margin:0;
  padding:30px 18px;
}
 
.home-btn{
  position:absolute;
  top:20px;
  left:20px;
  background:#fff;
  color:#0d47a1;
  padding:10px 16px;
  border-radius:999px;
  text-decoration:none;
  box-shadow:0 6px 18px rgba(0,0,0,.15);
}
 
.container{
  max-width:1200px;
  margin:auto;
}
 
header{
  text-align:center;
  margin-bottom:30px;
}
 
header h1{
  color:var(--primary);
}
 
.search-box input{
  width:90%;
  max-width:400px;
  padding:12px;
  border-radius:30px;
  border:1px solid #ccc;
}
 
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:25px;
}
 
.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  transition:.3s;
}
 
.card:hover{
  transform:translateY(-6px);
}
 
.card a{
  text-decoration:none;
  display:flex;
  gap:14px;
  align-items:center;
  color:var(--primary);
  font-weight:500;
}
 
.icon{
  font-size:24px;
  color:var(--accent);
}
 
.count{
  text-align:center;
  margin-top:10px;
}
footer{
  text-align:center;
  margin-top:50px;
  font-size:14px;
  color:#777;
}
</style>
</head>
 
<body>
 
<div class="container">
 
<header>
<h1>&#128215;</i>QP</h1>
 
<div class="search-box">
<input type="text" id="search" placeholder=" ค้นหาไฟล์...">
</div>
 
<div id="fileCount" class="count"> กำลังโหลด...</div>
</header>
 
<div class="grid" id="qpList"></div>
</div>
 
<footer>VGD/S - Sustainable</footer>
 
</div>
 
 
<script>
const container = document.getElementById("qpList");
const countBox = document.getElementById("fileCount");
 
function getIcon(name){
  name = name.toLowerCase();
 
  if(name.endsWith(".pdf")) return "fa-file-pdf";
  if(name.match(/\.(xls|xlsx)$/)) return "fa-file-excel";
  if(name.match(/\.(doc|docx)$/)) return "fa-file-word";
  if(name.match(/\.(ppt|pptx)$/)) return "fa-file-powerpoint";
  if(name.match(/\.(jpg|png|jpeg)$/)) return "fa-file-image";
 
  return "fa-file";
}
 
fetch("../files.json")
.then(res => res.json())
.then(files => {
 
  let count = 0;
 
  files.forEach(path => {
 
    path = path.trim();
 
    if(!path.toLowerCase().startsWith("QP/")) return;
 
    count++;
 
    const fileURL =
      "https://ploy10338.github.io/SD/" +
      encodeURIComponent(path).replace(/%2F/g, "/");
 
    const name = path.split("/").pop();
 
    const card = document.createElement("div");
    card.className = "card";
 
    //    Icon
    card.innerHTML = `
<a href="${fileURL}" target="_blank">
<i class="fa-solid ${getIcon(name)} icon"></i>
    ${name.replace(/\.[^/.]+$/, "")}
</a>
 
    `;
 
    container.appendChild(card);
  });
 
  countBox.innerText = " จำนวนทั้งหมด: " + count + " รายการ";
})
.catch(err => {
  console.error(err);
  countBox.innerText = " โหลดข้อมูลไม่สำเร็จ";
});
 
//  search
document.getElementById("search").addEventListener("keyup", function () {
  const keyword = this.value.toLowerCase();
  let visible = 0;
 
  document.querySelectorAll(".card").forEach(card => {
    const show = card.innerText.toLowerCase().includes(keyword);
    card.style.display = show ? "" : "none";
    if(show) visible++;
  });
 
  document.getElementById("fileCount").innerText =
    keyword ? " พบ " + visible + " รายการ"
            : " จำนวนทั้งหมด: " + visible + " รายการ";
});
</script>
 
  
</body>
</html>
